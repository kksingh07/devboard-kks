# Goal: To deploy the built images from CI steps once the CI workflow is successful

name: CD

on:
    workflow_run:
      workflows: ['Validate']
      types: [completed]
      branches:
          - 'beta'


jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Copy .env file
              run: cp .env.example .env

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Deploy the containers with Docker Compose
              run: |
                docker compose pull
                docker compose up -d

         