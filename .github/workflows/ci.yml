# Goal - Lint, Build, Test the code for Frontend & Backend, then Push the images to DockerHub

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup NodeJs
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm packages
        run: npm install
        working-directory: frontend
        
      - name: Lint the code
        run: npm run lint
        working-directory: frontend

      - name: Run Tests
        run: npm run test
        working-directory: frontend

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
            context: ./frontend        
            push: true
            tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Run Go Formatter
        run: go fmt
        working-directory: backend

      - name: Run Go Vet
        run: go vet
        working-directory: backend

      - name: Run Tests
        run: go test
        working-directory: backend

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
            context: ./backend        
            push: true
            tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest