# Goal - Lint, Build, Test the code for Frontend & Backend, then Push the images to DockerHub

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup NodeJs
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm packages
        run: npm install
        working-directory: frontend
        
      - name: Lint the code
        run: npm run lint
        working-directory: frontend

      - name: Run Tests
        run: npm run test
        working-directory: frontend